# Nebulla Core — design tokens (source of truth for colors, type, radius, spacing).
# Consumable by tooling or hand-synced into CSS / Tailwind when implementing the light IDE theme.

name: Nebulla Core

colors:
  surface: '#f7f9ff'
  surface-dim: '#cfdbeb'
  surface-bright: '#f7f9ff'
  surface-container-lowest: '#ffffff'
  surface-container-low: '#edf4ff'
  surface-container: '#e3efff'
  surface-container-high: '#dde9fa'
  surface-container-highest: '#d7e4f4'
  on-surface: '#111d28'
  on-surface-variant: '#4a4455'
  inverse-surface: '#26313e'
  inverse-on-surface: '#e8f1ff'
  outline: '#7b7487'
  outline-variant: '#ccc3d8'
  surface-tint: '#732ee4'
  primary: '#630ed4'
  on-primary: '#ffffff'
  primary-container: '#7c3aed'
  on-primary-container: '#ede0ff'
  inverse-primary: '#d2bbff'
  secondary: '#244dd9'
  on-secondary: '#ffffff'
  secondary-container: '#4568f3'
  on-secondary-container: '#fffbff'
  tertiary: '#4c4c69'
  on-tertiary: '#ffffff'
  tertiary-container: '#646482'
  on-tertiary-container: '#e5e3ff'
  error: '#ba1a1a'
  on-error: '#ffffff'
  error-container: '#ffdad6'
  on-error-container: '#93000a'
  primary-fixed: '#eaddff'
  primary-fixed-dim: '#d2bbff'
  on-primary-fixed: '#25005a'
  on-primary-fixed-variant: '#5a00c6'
  secondary-fixed: '#dde1ff'
  secondary-fixed-dim: '#b8c3ff'
  on-secondary-fixed: '#001355'
  on-secondary-fixed-variant: '#0036bc'
  tertiary-fixed: '#e1dfff'
  tertiary-fixed-dim: '#c5c3e5'
  on-tertiary-fixed: '#191932'
  on-tertiary-fixed-variant: '#444460'
  background: '#f7f9ff'
  on-background: '#111d28'
  surface-variant: '#d7e4f4'

typography:
  h1:
    fontFamily: Inter
    fontSize: 24px
    fontWeight: '500'
    lineHeight: 32px
    letterSpacing: -0.02em
  h2:
    fontFamily: Inter
    fontSize: 18px
    fontWeight: '500'
    lineHeight: 24px
    letterSpacing: -0.01em
  body-ui:
    fontFamily: Inter
    fontSize: 13px
    fontWeight: '400'
    lineHeight: 20px
  label-md:
    fontFamily: Inter
    fontSize: 13px
    fontWeight: '500'
    lineHeight: 18px
  label-sm:
    fontFamily: Inter
    fontSize: 11px
    fontWeight: '400'
    lineHeight: 16px
    letterSpacing: 0.02em
  code:
    fontFamily: JetBrains Mono
    fontSize: 13px
    fontWeight: '400'
    lineHeight: 20px

rounded:
  sm: 0.25rem
  DEFAULT: 0.5rem
  md: 0.75rem
  lg: 1rem
  xl: 1.5rem
  full: 9999px

spacing:
  panel-gap: 1px
  container-padding: 12px
  element-gap: 8px
  sidebar-width: 260px
  toolbar-height: 40px
