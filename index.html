<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebulla IDE - Project Workspace</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.bunny.net/css?family=inter:300,400,500|space-grotesk:300,400,500,600|material-symbols-outlined"
      rel="stylesheet"
    />
    <script>
      // Aggressively unregister and block Service Workers in AI Studio
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
        // Block new registrations
        navigator.serviceWorker.register = function() {
          return new Promise(function(resolve, reject) {
            reject(new Error('Service Worker registration is disabled in this environment.'));
          });
        };
      }
    </script>
  </head>
  <body class="flex flex-col">
    <div id="root" class="w-full h-full flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
